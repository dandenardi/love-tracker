services:
  - type: web
    name: love-tracker-server
    runtime: node
    plan: free
    region: ohio
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # User must set this manually in Render
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secret if not provided
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
